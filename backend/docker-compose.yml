services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: segurapro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/segurapro?schema=public
      JWT_SECRET: local-development-secret
      JWT_EXPIRES_IN: 1d
      CORS_ORIGIN: http://localhost:5173
      PORT: 3000
      NODE_ENV: development
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && node prisma/seed.js && npm run start"

volumes:
  postgres_data:
